<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catculator</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div class="calculator">
        <div class="logo">
            <img class="picture unselectable" src="images/catio.png" alt="A two-tone depiction of a Cat" width="64" height="64">
            <h1 class="title unselectable">CATIO</h1>
        </div>
        <div class="display unselectable">0</div>
        <div class="inputArea">
            <div class="leftInput">
                <button class="digit" data-value="1" tabindex="-1">1</button>
                <button class="digit" data-value="2" tabindex="-1">2</button>
                <button class="digit" data-value="3" tabindex="-1">3</button>
                <button class="digit" data-value="4" tabindex="-1">4</button>
                <button class="digit" data-value="5" tabindex="-1">5</button>
                <button class="digit" data-value="6" tabindex="-1">6</button>
                <button class="digit" data-value="7" tabindex="-1">7</button>
                <button class="digit" data-value="8" tabindex="-1">8</button>
                <button class="digit" data-value="9" tabindex="-1">9</button>
                <button class="digit" data-value="0" tabindex="-1">0</button>
                <button class="separator" data-value="." tabindex="-1">.</button>
                <button class="negation"  tabindex="-1">&plusmn;</button>
            </div>
            <div class="rightInput">
                <button class="clear" tabindex="-1">C</button>
                <button class="delete" data-value="Backspace" tabindex="-1">D</button>
                <button class="operation" data-value="+" tabindex="-1">&plus;</button>
                <button class="operation" data-value="-" tabindex="-1">&minus;</button>
                <button class="operation" data-value="*" tabindex="-1">&times;</button>
                <button class="operation" data-value="/" tabindex="-1">&divide;</button>
                <button class="pi" tabindex="-1">&pi;</button>
                <button class="equals" data-value="Enter" tabindex="-1">=</button>
            </div>
        </div>
    </div>
</body>
</html>
