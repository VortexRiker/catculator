<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catculator</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div class="calculator">
        <div class="display">0</div>
        <div class="inputArea">
            <div class="leftInput">
                <button class="digit" data-value="1">1</button>
                <button class="digit" data-value="2">2</button>
                <button class="digit" data-value="3">3</button>
                <button class="digit" data-value="4">4</button>
                <button class="digit" data-value="5">5</button>
                <button class="digit" data-value="6">6</button>
                <button class="digit" data-value="7">7</button>
                <button class="digit" data-value="8">8</button>
                <button class="digit" data-value="9">9</button>
                <button class="digit" data-value="0">0</button>
                <button class="separator">.</button>
                <button class="negation">&plusmn;</button>
            </div>
            <div class="rightInput">
                <button class="clear">C</button>
                <button class="delete">D</button>
                <button class="operation" data-value="+">&plus;</button>
                <button class="operation" data-value="-">&minus;</button>
                <button class="operation" data-value="*">&times;</button>
                <button class="operation" data-value="/">&divide;</button>
                <button class="pi">&pi;</button>
                <button class="equals">=</button>
            </div>
        </div>
    </div>
</body>
</html>
